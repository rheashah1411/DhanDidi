[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 140
exclude = [".cache", "work"]

[tool.ruff.lint]
# Keep CI focused on correctness while allowing the localized content tables to
# remain readable without a mechanical reformat.
select = ["E9", "F63", "F7", "F82"]
